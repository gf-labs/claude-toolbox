name: test

# Lint + test gate, plus a manifest<->tag drift guard on main. Runs on PRs into
# main (the consumer-facing boundary) and on pushes to develop/main. Adjust the
# install/run lines per repo when stamping (ruff+pytest here; pytest-only elsewhere).
on:
  pull_request:
    branches: [main]
  push:
    branches: [develop, main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

# Least privilege: these jobs only read the checked-out tree.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs; Dependabot keeps them current.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      # --- per-repo: adjust install + test/lint to the target on stamp ---
      - name: Install dev deps
        run: python3 -m pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: python3 -m pytest tests/ -q

  # Guards the "manifest bumped on main with no matching tag" drift (the ramp
  # failure mode). Presumes releases tag the release-branch tip BEFORE merge so
  # tag and manifest co-arrive on main (see the policy's manifest<->tag section);
  # without that it can flap in the post-merge/pre-tag window.
  manifest-guard:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # tags needed for the default-mode comparison
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Assert main's manifest has a matching tag
        # Vendored into .github/scripts/ by stamp-git-policy (re-stamp to update).
        run: python3 .github/scripts/check-manifest-tag.py --repo .
