name: test

# Lint + test gate, plus a manifest<->tag drift guard on main. Runs on PRs into
# main (the consumer-facing boundary) and on pushes to develop/main.
# The repo is ruff-clean; `ruff check .` runs before pytest and fails the gate
# on any lint regression (config in pyproject.toml [tool.ruff]).
on:
  pull_request:
    branches: [main]
  push:
    branches: [develop, main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

# Least privilege: these jobs only read the checked-out tree.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs; Dependabot keeps them current.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      # The suite is deliberately stdlib-only (scripts loaded by path via
      # importlib); pyproject is tooling config, not an installable package —
      # so we install pytest directly rather than `pip install -e '.[dev]'`.
      - name: Install pytest + ruff
        run: python3 -m pip install 'pytest>=8' 'ruff>=0.6'
      - name: Lint
        run: ruff check .
      - name: Test
        run: python3 -m pytest tests/ -q

  # Guards the "manifest bumped on main with no matching tag" drift (the ramp
  # failure mode). Presumes releases tag the release-branch tip BEFORE merge so
  # tag and manifest co-arrive on main (see the policy's manifest<->tag section);
  # without that it can flap in the post-merge/pre-tag window.
  manifest-guard:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # tags needed for the default-mode comparison
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Assert main's manifest has a matching tag
        run: python3 scripts/check-manifest-tag.py --repo .
